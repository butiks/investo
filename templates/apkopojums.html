{% extends "pamats.html" %}

{% block content %}

<table border="1">
  <h1> Portfeļa kopsavilkums <img src="{{ url_for('static', filename='img/portfelis.svg')}}" height = "50" width="50"></h1>
  <thead>
    <tr>
      <th>Simbols</th>
      <th>Daudzums </th>
      <th>Iegādes cena</th>
      <th>Iegādes datums</th>
    </tr>
  </thead>

  <tbody>
    
      {% for p in pirkumi %}
      <tr>
        <td>{{p.simbols}}</td>
        <td>{{p.daudzums}}</td>
        <td>{{ p.iegades_cena }}</td>
        <td>{{ p.iegades_datums }}</td>
      </tr>
      {% endfor %}
  </tbody>
</table>


{% endblock %}
